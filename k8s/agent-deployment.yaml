apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-agent
  namespace: chaos-monkey
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-agent
  template:
    metadata:
      labels:
        app: chaos-agent
    spec:
      serviceAccountName: chaos-agent
      containers:
      - name: chaos-agent
        image: chaos-agent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: BACKEND_URL
          value: "http://chaos-backend:8000"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-agent
  namespace: chaos-monkey
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-agent
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-agent
subjects:
- kind: ServiceAccount
  name: chaos-agent
  namespace: chaos-monkey
